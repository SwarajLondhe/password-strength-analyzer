<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Password Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>🔐 Password Security Tool</h2>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter password">
        <span id="toggle">👁️</span>
    </div>

    <div class="buttons">
        <button onclick="generatePassword()">Generate</button>
        <button onclick="copyPassword()">Copy</button>
        <button onclick="toggleMode()">🌙</button>
    </div>

    <div class="strength-bar">
        <div id="bar"></div>
    </div>

    <p id="text"></p>
    <p id="percent"></p>

    <ul id="tips"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
